name: Deploy

on:
  push:
    tags:
      - '*'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion" 
            nvm -v
            nvm use 20
            node -v
            cd /root/srv/hong97-ltd-next
            git fetch https://github.com/hongding0211/hong97-ltd-next.git main
            git reset --hard FETCH_HEAD
            pnpm install --frozen-lockfile
            pnpm build:fe
            pnpm build:server
            pm2 restart hong97-ltd-next
            pm2 restart hong97-ltd-next-server